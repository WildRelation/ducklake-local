services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ducklake
      POSTGRES_USER: duck
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: 87654321
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
