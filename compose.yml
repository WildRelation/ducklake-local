x-minio-secrets:
  _: &minio-user minioadmin
  __: &minio-password 87654321

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ducklake
      POSTGRES_USER: duck
      POSTGRES_PASSWORD: 123456
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duck -d ducklake"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio:
    image: quay.io/minio/minio:latest
    command: server --console-address ":9001" /data
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: *minio-user
      MINIO_ROOT_PASSWORD: *minio-password
      MINIO_REGION_NAME: local
      MINIO_REGION: local
    volumes:
      - s3_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: *minio-user
      MINIO_ROOT_PASSWORD: *minio-password
    restart: on-failure
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb local/ducklake;
      echo 'Bucket created';
      exit 0;
      "

volumes:
  postgres_data:
  s3_data:
